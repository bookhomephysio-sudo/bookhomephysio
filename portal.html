<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | bookHomePhysio</title>
    <style>
        :root {
            --teal: #008080;
            --mint: #e6f7f4;
            --dark-teal: #005a5a;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--mint);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 128, 128, 0.1);
            max-width: 400px;
            width: 100%;
        }
        .brand-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-header h2 {
            color: var(--teal);
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        .brand-header p {
            color: #777;
            margin: 4px 0 0;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-color);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--teal);
        }
        .btn-submit {
            width: 100%;
            background-color: var(--teal);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: var(--dark-teal);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="brand-header">
        <h2>bookHomePhysio</h2>
        <p>Therapist & Provider Gateway Login</p>
    </div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="staffEmail">Clinical Email Address</label>
            <input type="email" id="staffEmail" placeholder="name@clinic.com" required>
        </div>
        
        <div class="form-group">
            <label for="staffPhone">Registered Mobile Prefix (10 Digits)</label>
            <input type="tel" id="staffPhone" placeholder="9876543210" pattern="[0-9]{10}" required>
        </div>
        
        <button type="submit" class="btn-submit">Authenticate Secure Session</button>
    </form>
</div>

<script src="js/auth-portal.js"></script>

</body>
</html>
